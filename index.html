<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Martin Krebs | Technical Solutions Manager</title>
    <meta name="description" content="Digital Business Card — Martin Krebs, Technical Solutions Manager">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="theme-color" content="#0e0e1a">

    <!-- Open Graph (WhatsApp, Signal, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Martin Krebs — Technical Solutions Manager">
    <meta property="og:description" content="Digital Business Card — Martin Krebs, Technical Solutions Manager">
    <meta property="og:image" content="https://martin-krebs.eu/og-image.png">
    <meta property="og:url" content="https://martin-krebs.eu/">

    <!-- Image dimensions for Discord/Twitter -->
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/png">

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Martin Krebs — Technical Solutions Manager">
    <meta name="twitter:description" content="Digital Business Card — Martin Krebs, Technical Solutions Manager">
    <meta name="twitter:image" content="https://martin-krebs.eu/og-image.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background -->
    <div class="bg-canvas">
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
    </div>

    <!-- Top Controls -->
    <div class="top-controls">
        <button type="button" class="top-btn lang-toggle" onclick="toggleLang()" aria-label="Switch language" id="langBtn">EN</button>
        <button type="button" class="top-btn theme-toggle" onclick="toggleTheme()" aria-label="Theme wechseln">
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
    </div>

    <div class="app" id="app"></div>

    <script src="content.js"></script>
    <script>
        // ── SVG Icon Map ─────────────────────────────────────
        const ICONS = {
            github: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>',
            linkedin: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>',
            mail: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>',
            xing: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.188 0c-.517 0-.741.325-.927.66 0 0-7.455 13.224-7.702 13.657.015.024 4.919 9.023 4.919 9.023.17.308.436.66.967.66h3.454c.211 0 .375-.078.463-.22.089-.151.089-.346-.009-.536l-4.879-8.916c-.004-.006-.004-.016 0-.022L22.139.756c.095-.191.097-.387.006-.535C22.056.078 21.894 0 21.686 0h-3.498zM3.648 4.74c-.211 0-.385.074-.473.216-.09.149-.078.339.02.531l2.34 4.05c.004.01.004.016 0 .021L3.169 13.9c-.09.191-.097.383-.006.535.09.141.254.22.463.22h3.455c.518 0 .766-.348.945-.667l2.416-4.4s-2.364-4.124-2.364-4.124c-.165-.305-.43-.66-.963-.66H3.648v-.064z"/></svg>',
            twitter: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
            website: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
            phone: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>',
            send: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>',
            github_sm: '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>',
        };

        // ── State ────────────────────────────────────────────
        const CONFIG = CONTENT;
        let currentLang = localStorage.getItem('flux-card-lang') || 'de';
        let captchaA, captchaB;
        let formLoadTime = Date.now();

        // ── Theme Toggle ─────────────────────────────────────
        const THEME_COLORS = { dark: '#0e0e1a', light: '#e8eaf0' };

        function setThemeColor(theme) {
            document.querySelector('meta[name="theme-color"]').setAttribute('content', THEME_COLORS[theme]);
        }

        function toggleTheme() {
            const html = document.documentElement;
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            setThemeColor(next);
            localStorage.setItem('flux-card-theme', next);
        }

        (function initTheme() {
            const saved = localStorage.getItem('flux-card-theme');
            if (saved) {
                document.documentElement.setAttribute('data-theme', saved);
                setThemeColor(saved);
            }
        })();

        // ── Render from content.js ───────────────────────────
        applyMeta(CONFIG);
        renderApp(CONFIG);
        applyLang(currentLang);

        function applyMeta(c) {
            const resolve = s => s.replace('{name}', c.name).replace('{role}', c.role);
            document.title = resolve(c.meta.title);
            document.querySelector('meta[name="description"]').content = resolve(c.meta.description);
            document.querySelector('link[rel="icon"]').href = c.favicon;

            const ogTitle = `${c.name} — ${c.role}`;
            document.querySelector('meta[property="og:title"]').content = ogTitle;
            document.querySelector('meta[property="og:description"]').content = resolve(c.meta.description);
            document.querySelector('meta[property="og:image"]').content = c.meta.ogImage;
            document.querySelector('meta[property="og:url"]').content = c.meta.ogUrl;
            document.querySelector('meta[name="twitter:title"]').content = ogTitle;
            document.querySelector('meta[name="twitter:description"]').content = resolve(c.meta.description);
            document.querySelector('meta[name="twitter:image"]').content = c.meta.ogImage;
        }

        function renderApp(c) {
            const isMailto = link => link.url.startsWith('mailto:');
            const linkTarget = link => isMailto(link) ? '' : ' target="_blank" rel="noopener"';

            const socialHTML = c.socialLinks.map(link =>
                `<a href="${link.url}"${linkTarget(link)} class="social-link">
                    ${ICONS[link.icon] || ''}
                    <span>${link.label}</span>
                </a>`
            ).join('');

            const focusHTML = c.focusAreas.map(f =>
                `<div class="focus-item">
                    <div class="focus-icon">${f.icon}</div>
                    <div>
                        <h3 data-i18n="focus_${f.i18nKey}_title"></h3>
                        <p data-i18n="focus_${f.i18nKey}_desc"></p>
                    </div>
                </div>`
            ).join('');

            const skillsHTML = c.skills.map(s =>
                `<span class="skill-tag">${s}</span>`
            ).join('');

            document.getElementById('app').innerHTML = `
                <div class="hero glass-card">
                    <div class="avatar">
                        <img src="${c.avatar}" alt="${c.name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">
                    </div>
                    <h1>${c.name}</h1>
                    <p class="role">${c.role}</p>
                    <p class="tagline" data-i18n="tagline"></p>
                    <div class="social-row">${socialHTML}</div>
                </div>

                <div class="sections">
                    <div class="section glass-card">
                        <div class="section-title" data-i18n="section_focus"></div>
                        <div class="focus-list">${focusHTML}</div>
                    </div>

                    <div class="section glass-card">
                        <div class="section-title" data-i18n="section_skills"></div>
                        <div class="skills-grid">${skillsHTML}</div>
                    </div>

                    <div class="section glass-card">
                        <div class="section-title" data-i18n="section_contact"></div>
                        <form class="contact-form" id="contactForm" onsubmit="return handleSubmit(event)">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="name" data-i18n="label_name"></label>
                                    <input type="text" id="name" name="name" required autocomplete="name" data-i18n-ph="ph_name">
                                </div>
                                <div class="form-group">
                                    <label for="email" data-i18n="label_email"></label>
                                    <input type="email" id="email" name="email" required autocomplete="email" data-i18n-ph="ph_email">
                                </div>
                            </div>
                            <div class="hp-field" aria-hidden="true">
                                <label for="website">Website</label>
                                <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
                            </div>
                            <div class="form-group">
                                <label for="message" data-i18n="label_message"></label>
                                <textarea id="message" name="message" required data-i18n-ph="ph_message"></textarea>
                            </div>
                            <div class="captcha-row">
                                <span class="captcha-question" id="captchaQuestion"></span>
                                <div class="form-group">
                                    <input type="text" id="captchaAnswer" class="captcha-input" required placeholder="?" autocomplete="off">
                                </div>
                            </div>
                            <button type="submit" class="submit-btn" id="submitBtn">
                                ${ICONS.send}
                                <span data-i18n="btn_send"></span>
                            </button>
                            <div class="form-status" id="formStatus"></div>
                        </form>
                    </div>
                </div>

                <div class="footer">
                    ${c.name}
                    <a href="${c.meta.repoUrl}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:4px;">
                        ${ICONS.github_sm}
                        ${c.meta.repoLabel}
                    </a>
                    <p data-i18n-html="footer_disclaimer" style="font-size:.75rem;opacity:.55;line-height:1.5;margin:12px 0 0;text-align:center"></p>
                </div>`;
        }

        // ── i18n ─────────────────────────────────────────────
        function applyLang(lang) {
            if (!CONFIG) return;
            currentLang = lang;
            const t = CONFIG.i18n[lang];
            if (!t) return;

            document.documentElement.setAttribute('lang', lang);
            document.getElementById('langBtn').textContent = lang === 'de' ? 'DE' : 'EN';

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.textContent = t[key];
            });

            document.querySelectorAll('[data-i18n-html]').forEach(el => {
                const key = el.getAttribute('data-i18n-html');
                if (t[key]) el.innerHTML = t[key];
            });

            document.querySelectorAll('[data-i18n-ph]').forEach(el => {
                const key = el.getAttribute('data-i18n-ph');
                if (t[key]) el.setAttribute('placeholder', t[key]);
            });

            generateCaptcha();
            localStorage.setItem('flux-card-lang', lang);
        }

        function toggleLang() {
            const langs = Object.keys(CONFIG.i18n);
            const idx = langs.indexOf(currentLang);
            applyLang(langs[(idx + 1) % langs.length]);
        }

        // ── Spam Protection ──────────────────────────────────
        function generateCaptcha() {
            if (!CONFIG) return;
            captchaA = Math.floor(Math.random() * 10) + 1;
            captchaB = Math.floor(Math.random() * 10) + 1;
            const label = CONFIG.i18n[currentLang].captcha_label;
            const el = document.getElementById('captchaQuestion');
            if (el) el.textContent = `${label}: ${captchaA} + ${captchaB} = ?`;
        }

        function handleSubmit(e) {
            e.preventDefault();
            const status = document.getElementById('formStatus');
            const t = CONFIG.i18n[currentLang];

            if (document.getElementById('website').value) {
                status.className = 'form-status success';
                status.textContent = t.msg_sent;
                return false;
            }

            if (Date.now() - formLoadTime < 3000) {
                status.className = 'form-status error';
                status.textContent = t.msg_wait;
                return false;
            }

            const answer = parseInt(document.getElementById('captchaAnswer').value, 10);
            if (answer !== captchaA + captchaB) {
                status.className = 'form-status error';
                status.textContent = t.msg_captcha_wrong;
                generateCaptcha();
                document.getElementById('captchaAnswer').value = '';
                return false;
            }

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const message = document.getElementById('message').value.trim();

            const subject = encodeURIComponent(t.mailto_subject.replace('{name}', name));
            const body = encodeURIComponent(
                `Name: ${name}\nE-Mail: ${email}\n\n${message}`
            );

            window.location.href = `mailto:${CONFIG.email}?subject=${subject}&body=${body}`;

            status.className = 'form-status success';
            status.textContent = t.msg_opening_mail;

            setTimeout(() => {
                document.getElementById('contactForm').reset();
                generateCaptcha();
                status.className = 'form-status';
                status.textContent = '';
            }, 4000);

            return false;
        }
    </script>
</body>
</html>
